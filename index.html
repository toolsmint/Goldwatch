<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Gold Prices – Real-Time Updates Worldwide</title>
  <meta name="description" content="Track live global gold prices with interactive charts and historical data. 24K, 22K gold rates updated in real-time worldwide." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar">
    <a class="nav-logo" href="#">GoldWatch</a>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="#prices">Prices</a></li>
      <li><a href="#chart">Chart</a></li>
      <li><a href="#history">History</a></li>
      <li><a href="#about">About</a></li>
    </ul>
    <a href="#prices" class="nav-cta">Live Rates</a>
  </nav>

  <!-- Hero -->
  <section class="hero" id="home">
    <h1>Live <em>Gold Prices</em><br/>Real-Time Updates</h1>
    <p class="hero-sub">Track gold prices instantly worldwide. 24K & 22K rates across multiple currencies.</p>
    <div class="hero-actions">
      <a href="#prices" class="btn-primary">View Live Rates</a>
      <a href="#chart" class="btn-secondary">Open Chart</a>
    </div>
  </section>

  <!-- Prices Section -->
  <section id="prices">
    <div class="container">
      <div class="prices-grid" id="price-grid"></div>
      <span id="last-update">Fetching prices…</span>
      <button onclick="fetchPrices()">↻ Refresh</button>
    </div>
  </section>

  <!-- Chart Section -->
  <section id="chart">
    <div class="container">
      <div id="tradingview_chart"></div>
    </div>
  </section>

  <!-- History Section -->
  <section id="history">
    <div class="container">
      <table id="history-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>USD / oz</th>
            <th>EUR / oz</th>
            <th>GBP / oz</th>
            <th>INR / oz</th>
            <th>Change</th>
          </tr>
        </thead>
        <tbody id="history-body">
          <tr><td colspan="6">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
